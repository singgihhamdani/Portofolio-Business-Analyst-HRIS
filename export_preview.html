<!DOCTYPE html><html><head><meta charset="utf-8"><title>BRD HRIS Analytics PDF Export</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
mermaid.initialize({startOnLoad:true});

const renderer = new marked.Renderer();
const defaultCode = renderer.code.bind(renderer);
renderer.code = function(code) {
    if (code.lang === 'mermaid') return '<div class="mermaid">' + code.text + '</div>';
    return defaultCode(code);
};
marked.use({renderer});

window.previewFile = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('content').innerHTML = marked.parse(e.target.result);
        setTimeout(() => mermaid.init(undefined, document.querySelectorAll('.mermaid')), 100);
    };
    reader.readAsText(file);
}
</script>
<style>
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 2rem; color: #24292f; background: #fff; }
h1, h2, h3, h4, h5 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 24px; }
table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
th, td { border: 1px solid #d0d7de; padding: 6px 13px; }
th { background-color: #f6f8fa; }
code { background-color: #f6f8fa; padding: 0.2em 0.4em; border-radius: 6px; font-family: monospace; }
pre { background-color: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; }
.mermaid { display: flex; justify-content: center; margin: 2rem 0; width: 100%; }
blockquote { padding: 0 1em; color: #57606a; border-left: .25em solid #d0d7de; margin: 0; }
#input-area { padding: 40px; border: 2px dashed #d0d7de; text-align: center; border-radius: 12px; background-color: #f8fbff;}
@media print {
body { max-width: 100%; padding: 0; margin: 0; }
.mermaid { break-inside: avoid; }
#input-area { display: none; }
}
</style>
</head><body>
<div id="input-area">
  <h2>Aplikasi Print to PDF: BRD HRIS Analytics</h2>
  <label for="md-upload" style="background:#0969da;color:white;padding:10px 20px;border-radius:6px;cursor:pointer;display:inline-block;font-weight:bold;">Pilih File Markdown</label>
  <input id="md-upload" type="file" accept=".md" onchange="previewFile(event)" style="display:none;">
  <p style="margin-top:16px;">Silakan pilih file <code>brd_hris_analytics.md</code> Anda. Sistem akan secara otomatis membaca dan me-render grafik Mermaid menjadi Diagram Alur yang sempurna.</p>
  <p>Setelah tampil memanjang, cukup tekan <b>Ctrl + P</b> di browser Anda lalu pilih <b>Save as PDF / Simpan sebagai PDF</b>.</p>
</div>
<div id="content"></div>
</body></html>
